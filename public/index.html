<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Sharing Application</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #map {
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        async function startApp() {
            // 1. Get Username and Login to get the Token (REQUIRED: Auth flow)
            const username = prompt("Enter your Name to start tracking") || `User_${Math.floor(Math.random() * 1000)}`;

            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            const { token } = await response.json();

            // 2. Connect to Socket using the Token
            const socket = io({
                auth: { token } // REQUIRED: Sends the JWT to the server
            });

            const userId = username;
            const map = L.map('map').setView([0, 0], 2);
            const remoteMarkers = new Map();

            // Remove stale markers
            socket.on('server:user:left', (data) => {
                const { id } = data;
                if (remoteMarkers.has(id)) {
                    map.removeLayer(remoteMarkers.get(id));
                    remoteMarkers.delete(id);
                }
            });

            // Update other users
            socket.on('server:location:updates', (data) => {
                const { id, latitude, longitude } = data;
                if (id === userId) return;

                if (!remoteMarkers.has(id)) {
                    const marker = L.marker([latitude, longitude]).addTo(map).bindPopup(id);
                    remoteMarkers.set(id, marker);
                } else {
                    remoteMarkers.get(id).setLatLng([latitude, longitude]);
                }
            });

            // Fixed TileLayer URL
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            function getUsersCurrentLocation() {
                return new Promise((res, rej) => {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => res({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }),
                        (err) => rej(err),
                        { enableHighAccuracy: true, timeout: 5000 }
                    );
                });
            }

            let myMarker = null;
            setInterval(async () => {
                try {
                    const { latitude, longitude } = await getUsersCurrentLocation();

                    // Send update (Server will validate these are numbers)
                    socket.emit('client:location:update', { latitude, longitude });

                    if (!myMarker) {
                        myMarker = L.marker([latitude, longitude]).addTo(map).bindPopup('You (Live)');
                        map.setView([latitude, longitude], 13);
                    } else {
                        myMarker.setLatLng([latitude, longitude]);
                    }
                } catch (err) {
                    console.error("Location error:", err);
                }
            }, 5000);
        }

        window.addEventListener('load', startApp);
    </script>
</body>

</html>
